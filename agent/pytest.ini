[pytest]
markers =
    integration: marks tests as integration tests requiring ANTHROPIC_API_KEY and network access (deselect with '-m "not integration"')
    slow: marks tests as slow-running (deselect with '-m "not slow"')
    expensive: marks tests that call real LLM and cost money (deselect with '-m "not expensive"')

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show summary of skipped tests
addopts = -ra
